server:
  port: 8080

spring:
  application:
    name: lively-novel-backend
  datasource:
    url: jdbc:sqlite:../data/livelynovel.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-init-sql: PRAGMA journal_mode=WAL;
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  ai:
    openai:
      # DeepSeek OpenAI 兼容 API
      base-url: https://api.deepseek.com
      api-key: sk-d5181dab5fad41ea8bace90d129c3572  # 替换为你的 API Key
      chat:
        options:
          model: deepseek-chat

# Knife4j API 文档配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn
